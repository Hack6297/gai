<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>gai build 50</title>
    <link rel="icon" href="data:,">
    <link rel="stylesheet" href="https://unpkg.com/xp.css">
    <link rel="stylesheet" href="style.css">
  </head>
  <body>
    <main class="desktop" aria-label="gai desktop">
      <section class="window gabe-window" aria-label="gai chat window">
        <div class="title-bar glass-title">
          <div class="title-bar-text">gai build 50</div>
          <div class="title-bar-controls">
            <button aria-label="Minimize"></button>
            <button aria-label="Maximize"></button>
            <button aria-label="Close"></button>
          </div>
        </div>

        <div class="window-body">
          <nav class="menu-bar glass-strip" aria-label="Menu">
            <button>File</button>
            <button>Edit</button>
            <button>Live</button>
            <button>Help</button>
          </nav>

          <div class="app-shell">
            <aside class="side-panel">
              <div class="xp-card identity-card">
                <h2>gai build 50</h2>
                <p id="modelStatus">Checking model...</p>
              </div>

              <div class="xp-card chat-card">
                <div class="panel-heading">
                  <h2>Chats</h2>
                  <button type="button" id="newChatBtn">New</button>
                </div>
                <div id="chatList" class="chat-list" aria-label="Saved chats"></div>
                <button type="button" id="deleteChatBtn" class="danger-button">Delete Chat</button>
              </div>

              <fieldset>
                <legend>Live tools</legend>
                <label class="field-row checkbox-row">
                  <input id="useSearch" type="checkbox" checked>
                  <span>Use no-key search, weather, and news when needed</span>
                </label>
              </fieldset>

              <div class="xp-card source-card">
                <h2>Sources</h2>
                <ol id="sourceList"></ol>
              </div>
            </aside>

            <section class="chat-panel" aria-label="Chat">
              <div id="messages" class="messages" role="log" aria-live="polite">
                <article class="message assistant">
                  <div class="message-name">gai</div>
                  <p>Welcome to build 50. Ask math, weather, news, or anything else.</p>
                </article>
              </div>

              <form id="chatForm" class="composer">
                <textarea id="prompt" rows="3" placeholder="Ask gai build 50..."></textarea>
                <div class="composer-actions">
                  <button type="button" id="exampleBtn">Example</button>
                  <button type="button" id="clearBtn">Clear</button>
                  <button type="submit" class="primary">Ask gai</button>
                </div>
              </form>
            </section>
          </div>
        </div>
      </section>

      <footer class="taskbar" aria-label="Windows taskbar">
        <button class="start-button">start</button>
        <div class="taskbar-item active">gai build 50</div>
        <time id="clock"></time>
      </footer>
    </main>

    <script src="app.js"></script>
  </body>
</html>
